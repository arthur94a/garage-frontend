services:
  garage-backend:
    build:
      context: ../garage-backend
      dockerfile: Dockerfile
    container_name: garage-backend
    ports:
      - "8000:8000"
    volumes:
      - ../garage-backend/database:/app/database
    networks:
      - garage-bridge

  garage-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garage-frontend
    depends_on:
      - garage-backend
    ports:
      - "8080:80"
    networks:
      - garage-bridge

networks:
  garage-bridge:
    driver: bridge
